<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            background-color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        .tip-window {
            position: absolute;
            width: 260px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            animation: fadeOut 18s forwards;
            display: flex;
            flex-direction: column;
        }

        /* 标题栏：💖温馨提示 + 关闭按钮 */
        .tip-header {
            background-color: #f8f8f8;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        .tip-title {
            font-size: 14px;
            color: #333;
        }
        .close-btn {
            width: 18px;
            height: 18px;
            background: none;
            border: none;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }

        .tip-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
            font-family: -apple-system, BlinkMacSystemFont, "微软雅黑", sans-serif;
            font-size: 16px;
            color: #333;
            text-align: center;
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: scale(0.8); }
            15% { opacity: 1; transform: scale(1); }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }

        .petal {
            position: fixed;
            top: -10px;
            width: 15px;
            height: 15px;
            background: #ffb6c1;
            border-radius: 50% 0 50% 50%;
            transform: rotate(45deg);
            opacity: 0.7;
            animation: fall linear forwards;
            pointer-events: none;
        }
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(405deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <script>
        const tips = [
            '保持好心情~', '万事胜意~', '顺顺利利~',
            '早点休息~', '今天过得开心嘛~',
            '梦想成真~', '你超棒的！', '今天也要加油呀~',
            '别忘了吃饭~', '少熬夜，多爱自己~', '爱你呀~',
            '平安喜乐~', '记得想我呀~', '愿你天天开心~'
        ];

        const bgColors = [
            '#fff0f5', '#f0f8ff', '#f5fffa', '#fffaf0',
            '#f5f5dc', '#ffe4e1', '#e6e6fa', '#f0fff0'
        ];

        const sw = window.innerWidth;
        const sh = window.innerHeight;
        const windowWidth = 260;
        const windowMinHeight = 100;
        const totalWindows = 40;

        // 创建文字框
        function createTipWindow() {
            const tip = tips[Math.floor(Math.random() * tips.length)];
            const bg = bgColors[Math.floor(Math.random() * bgColors.length)];
            const x = Math.floor(Math.random() * (sw - windowWidth));
            const y = Math.floor(Math.random() * (sh - windowMinHeight));

            const windowEl = document.createElement('div');
            windowEl.className = 'tip-window';
            windowEl.style.left = `${x}px`;
            windowEl.style.top = `${y}px`;
            windowEl.style.backgroundColor = bg;

            // 标题栏 + 关闭按钮
            const header = document.createElement('div');
            header.className = 'tip-header';
            header.innerHTML = `
                <span class="tip-title">💖温馨提示</span>
                <button class="close-btn">×</button>
            `;

            // 内容区
            const content = document.createElement('div');
            content.className = 'tip-content';
            content.innerText = tip;

            // 关闭按钮事件
            header.querySelector('.close-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                windowEl.remove();
            });

            windowEl.appendChild(header);
            windowEl.appendChild(content);
            document.body.appendChild(windowEl);

            // 18秒后自动消失
            setTimeout(() => {
                windowEl.remove();
            }, 18000);
        }

        // 飘落花瓣
        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = `${Math.random() * 100}vw`;
            petal.style.animationDuration = `${Math.random() * 5 + 5}s`;
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 10000);
        }

        // 开始生成文字框（节奏和视频一致）
        function startWarmTips() {
            let count = 0;
            const interval = setInterval(() => {
                if (count >= totalWindows) {
                    clearInterval(interval);
                    return;
                }
                createTipWindow();
                count++;
            }, 300);
        }

        // 开始花瓣
        function startPetals() {
            setInterval(createPetal, 400);
        }

        // 触摸屏幕关闭所有窗口（手机适配）
        document.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('close-btn')) return;
            document.querySelectorAll('.tip-window').forEach(el => el.remove());
        });

        // 启动
        startWarmTips();
        startPetals();
    </script>
</body>
</html>
