<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温馨提示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
        }
        .tip-window {
            position: absolute;
            width: 300px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            font-family: "微软雅黑", sans-serif;
            font-size: 18px;
            text-align: center;
            border-radius: 4px;
            animation: fadeOut 10s forwards;
            word-break: break-all;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <script>
        // 提示语列表（和原代码一致）
        const tips = [
            '考研一战上岸', '考公顺利上岸', '实验一次成功',
            '答辩轻松通过', '绩点稳居前列', '奖学金轻松拿',
            '科研灵感爆发', '课题顺利结题', '转码成功上岸',
            '中顶刊顶会', '学的都考', '面试题都会',
            '大厂offer到手', '别熬夜', '年薪百万',
            '梦想成真', '保持好心情', '拥有传送门',
            '天天开心', '你是最棒的', '一定会越来越好'
        ];

        // 背景色列表（和原代码一致）
        const bgColors = [
            'lightpink', 'skyblue', 'lightgreen', 'lavender',
            'lightyellow', 'plum', 'coral', 'bisque', 'aquamarine',
            'mistyrose', 'honeydew', 'lavenderblush', 'oldlace',
            'palegoldenrod', 'powderblue', 'rosybrown', 'seashell'
        ];

        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        const windowWidth = 300;
        const windowHeight = 80;
        const totalWindows = 200;

        // 创建提示窗口
        function createTipWindow() {
            const tip = tips[Math.floor(Math.random() * tips.length)];
            const bg = bgColors[Math.floor(Math.random() * bgColors.length)];
            const x = Math.floor(Math.random() * (screenWidth - windowWidth));
            const y = Math.floor(Math.random() * (screenHeight - windowHeight));

            const windowEl = document.createElement('div');
            windowEl.className = 'tip-window';
            windowEl.style.left = `${x}px`;
            windowEl.style.top = `${y}px`;
            windowEl.style.backgroundColor = bg;
            windowEl.innerText = tip;

            document.body.appendChild(windowEl);

            // 10秒后自动关闭（和原代码的 10000ms 一致）
            setTimeout(() => {
                windowEl.remove();
            }, 10000);
        }

        // 批量生成窗口
        function startWarmTips() {
            let count = 0;
            const interval = setInterval(() => {
                if (count >= totalWindows) {
                    clearInterval(interval);
                    return;
                }
                createTipWindow();
                count++;
            }, 5); // 和原代码的 0.005s 间隔一致
        }

        // 按空格键关闭所有窗口（和原代码的功能一致）
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                document.querySelectorAll('.tip-window').forEach(el => el.remove());
            }
        });

        // 开始生成
        startWarmTips();
    </script>
</body>
</html>
